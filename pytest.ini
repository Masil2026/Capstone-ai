[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
pythonpath = .
addopts = -m "not llm and not realapi"
markers =
    llm: 실제 LLM API를 호출하는 테스트 (기본 pytest 실행에서 제외)
    realapi: 유료/쿼터 외부 API를 실제 호출하는 테스트 (기본 제외, pytest -m realapi 로만 실행)
    slow: sleep 등으로 수 초 걸리는 테스트 (기본 실행엔 포함. CI가 느려지면 -m "not slow"로 제외)